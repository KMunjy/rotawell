name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

# ─────────────────────────────────────────────
# JOB 1: Lint, Type Check, Build
# Runs on every PR and push. Fast fail gate.
# ─────────────────────────────────────────────
jobs:
  validate:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        # npm ci is deterministic and validates against package-lock.json
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values for build — real values are in Vercel
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_ENVIRONMENT: ci

# ─────────────────────────────────────────────
# JOB 2: Security Scanning
# Runs in parallel with validate.
# ─────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required for CodeQL/Semgrep to post results
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability audit
        # Fails the pipeline on high or critical vulnerabilities
        run: npm audit --audit-level=high --registry https://registry.npmjs.org

      - name: License compliance check
        run: |
          npx license-checker --onlyAllow 'MIT;Apache-2.0;ISC;BSD-2-Clause;BSD-3-Clause;0BSD;Python-2.0;CC0-1.0;Unlicense' \
            --excludePackages 'rotawell' \
            --production

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional, for org use

      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/nextjs
            p/typescript
            p/owasp-top-ten
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        # Don't fail the build if Semgrep token not configured yet
        continue-on-error: true

# ─────────────────────────────────────────────
# JOB 3: Unit & Integration Tests
# Add tests here as the test suite grows.
# ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: validate  # only run if build passes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # TODO: Add test runner when tests are written
      # - name: Run unit tests
      #   run: npm test -- --coverage
      #   env:
      #     NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      #     NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

      - name: Placeholder — no tests yet
        run: echo "⚠️  No tests configured. Add Jest/Vitest and update this step."

# ─────────────────────────────────────────────
# JOB 4: Bundle Size Check
# Warns (does not fail) if bundle grows > 10%
# ─────────────────────────────────────────────
  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Analyze bundle
        uses: nickvdyck/nextjs-bundle-analysis@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_ENVIRONMENT: ci
        continue-on-error: true

# ─────────────────────────────────────────────
# JOB 5: Deploy to Staging
# Runs on push to staging branch only.
# All jobs above must pass first.
# ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [validate, security, test]
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (staging)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_STAGING_PROJECT_ID }}
          working-directory: ./
          scope: ${{ secrets.VERCEL_ORG_ID }}
          # Deploy to staging (not production flag)
          alias-domains: rotawell-staging.vercel.app

      - name: Smoke test — health check
        run: |
          sleep 30  # wait for deployment to be live
          curl --fail --max-time 10 "${{ steps.deploy.outputs.url }}/api/health" \
            || (echo "Health check failed" && exit 1)

      - name: Smoke test — homepage loads
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" "${{ steps.deploy.outputs.url }}")
          if [ "$STATUS" != "200" ]; then
            echo "Homepage returned HTTP $STATUS"
            exit 1
          fi
          echo "Staging deployment healthy: ${{ steps.deploy.outputs.url }}"

# ─────────────────────────────────────────────
# JOB 6: Deploy to Production
# Runs on push to main only (after staging merge).
# Requires all gates to pass + explicit environment approval.
# ─────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [validate, security, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://rotawell.com  # update with actual domain
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (production)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Health check — production
        run: |
          sleep 30
          curl --fail --max-time 10 "https://rotawell.com/api/health" \
            || (echo "Production health check failed — consider rollback" && exit 1)

      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}
        continue-on-error: true  # don't fail deploy if Sentry not configured

      - name: Deployment summary
        run: |
          echo "## Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://rotawell.com" >> $GITHUB_STEP_SUMMARY

# ─────────────────────────────────────────────
# JOB 7: DAST — OWASP ZAP (weekly, staging only)
# Not part of the standard PR pipeline.
# Runs on a schedule against staging.
# ─────────────────────────────────────────────
  dast:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://rotawell-staging.vercel.app'
          rules_file_name: '.zap/rules.tsv'
          fail_action: false
          issue_title: 'OWASP ZAP Weekly Report'
          token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

# ─────────────────────────────────────────────
# SCHEDULE: Run DAST weekly on Mondays at 6am UTC
# and full security scan nightly
# ─────────────────────────────────────────────
# To enable scheduled runs, add this to the 'on:' block above:
#
# schedule:
#   - cron: '0 6 * * 1'   # Weekly DAST (Mondays 6am UTC)
#   - cron: '0 2 * * *'   # Daily security scan
